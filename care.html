<!doctype html>
<html lang="ms">
<head>
  <link rel="icon" href="favicon.svg">

  <link rel="stylesheet" href="assets/css/redesign_dark.css">
</head>
<body>

<!-- Header tanpa navigasi -->
<div class="header">
  <div class="brand">
    <img src="assets/bee-logo-design-for-honey-package-bee-logo-template-icon-illustration-design-free-vector (1).png" alt="An-Naas Kelulut Bekeng logo">
    <div class="title">
      <div class="main">An-Naas Kelulut Bekeng</div>
      <div class="sub">Premium Kelulut Honey Management</div>
    </div>
  </div>
</div>

<div class="container">
  <div class="controls">
    <a href="index.html"><button>Dashboard</button></a>
    <a href="colonies.html"><button>Koloni</button></a>
    <a href="harvests.html"><button>Hasil</button></a>
    <a href="care.html"><button>Penjagaan</button></a>
    <a href="reports.html"><button>Laporan</button></a>
    <a href="sales.html"><button>Jualan</button></a>
    <a href="inventory.html"><button>Stok</button></a>
    <a href="invoices.html"><button>Invois</button></a>
    <a href="charts.html"><button>Graf</button></a>
    <span id="driveStatus" style="margin-left:12px">Drive: Disconnected</span>
  </div>

  <h2>Penjagaan</h2>

  <form id="formCare" class="form-row">
    <select id="careColony" class="input"></select>
    <input id="careTitle" class="input" placeholder="Apa yang perlu dibuat">
    <input id="careRemind" class="input" type="datetime-local">
    <button type="submit">Tambah Log Penjagaan</button>
  </form>

  <table id="careTable">
    <thead>
      <tr>
        <th>Koloni</th>
        <th>Tugas</th>
        <th>Remind At</th>
        <th></th>
      </tr>
    </thead>
    <tbody></tbody>
  </table>

  <div class="note">
    <button onclick="exportStoreXLSX('careLogs')">Export Excel</button>
    <button onclick="exportReportPDF('careTable')">Export PDF</button>
  </div>
</div>

<footer>Kelulut Management System</footer>

<!-- libs -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://apis.google.com/js/api.js"></script>

<!-- app scripts -->
<script src="js/db.js"></script>
<script src="js/drive-backup.js"></script>
<script src="js/notifications.js"></script>
<script src="js/report.js"></script>
<script src="js/excel.js"></script>
<script src="js/main.js"></script>

<script>
  if('serviceWorker' in navigator){
    navigator.serviceWorker.register('service-worker.js').catch(e=>console.warn('SW failed',e));
  }
  window.addEventListener('load', async ()=>{
    if(typeof initDB==='function') await initDB();
    if(typeof scheduleDailyBackupAt==='function') scheduleDailyBackupAt(0,0);
    if(typeof scheduleReminders==='function') scheduleReminders();
  });
</script>

<!-- Google Drive Connect UI - PKCE -->
<div id="gdrive-ui" style="position:fixed;right:12px;bottom:12px;z-index:9999;">
  <button id="btnConnectDrive" onclick="DrivePKCE.initiateAuth()" style="padding:10px 14px;border-radius:8px;border:none;box-shadow:0 2px 6px rgba(0,0,0,0.2);background:#1a73e8;color:white;font-weight:600;">Connect Google Drive</button>
  <button id="btnBackupNow" onclick="DrivePKCE.backupAllFiles()" style="padding:10px 14px;border-radius:8px;border:none;margin-left:8px;display:none;background:#34a853;color:white;font-weight:600;">Backup Now</button>
</div>
<script src="drive_pkce.js"></script>

<!-- Theme toggle -->
<script>
(function(){
  try{
    if(localStorage.theme==='light'){
      document.documentElement.style.setProperty('--bg','#f6f7f9');
      document.documentElement.style.setProperty('--card','#ffffff');
      document.documentElement.style.setProperty('--text','#0b0c10');
      document.documentElement.style.setProperty('--muted','#5b6166');
    }
  }catch(e){}
})();
function toggleTheme(){
  try{
    const t = localStorage.theme==='light'?'dark':'light';
    if(t==='light'){
      document.documentElement.style.setProperty('--bg','#f6f7f9');
      document.documentElement.style.setProperty('--card','#ffffff');
      document.documentElement.style.setProperty('--text','#0b0c10');
      document.documentElement.style.setProperty('--muted','#5b6166');
      localStorage.theme='light';
    } else {
      document.documentElement.style.setProperty('--bg','#0b0c10');
      document.documentElement.style.setProperty('--card','#0f1115');
      document.documentElement.style.setProperty('--text','#e6e7e9');
      document.documentElement.style.setProperty('--muted','#9aa0a6');
      localStorage.theme='dark';
    }
  }catch(e){}
}
</script>

</body>
</html>
